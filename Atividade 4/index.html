<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo Pedra Papel Tesoura</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Bem-vindo ao Jogo Pedra Papel Tesoura</h1>
    <p>Escolha uma opção e veja se você vence o computador.</p>

    <div class="opcs">
        <button class="opc" data-opc="pedra"><img src="img/pedra.png" alt="Pedra" class="opcImg"></button>
        <button class="opc" data-opc="papel"><img src="img/papel.png" alt="Papel" class="opcImg"></button>
        <button class="opc" data-opc="tesoura"><img src="img/tesoura.png" alt="Tesoura" class="opcImg"></button>
    </div>

    <div class="results" id="resultado">    
        <p>Faça uma escolha para começar.</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
